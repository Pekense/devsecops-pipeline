name: Build and Push to ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure CLI - Login to ACR
        run: az acr login --name acrdevsecops2061

      - name: Build Docker image
        run: docker build -t acrdevsecops2061.azurecr.io/primeraimagen:latest .

      - name: Push Docker image
        run: docker push acrdevsecops2061.azurecr.io/primeraimagen:latest
